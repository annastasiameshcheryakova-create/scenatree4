<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindAR Two Markers</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: #000;
    }
  </style>
</head>
<body>
  <a-scene
    mindar-image="imageTargetSrc: ./markers/targets.mind; autoStart: true; uiScanning: yes; uiLoading: yes; uiError: yes;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    embedded
  >
    <a-assets>
      <a-asset-item id="girlModel" src="./models/girl.glb"></a-asset-item>
      <a-asset-item id="dragonModel" src="./models/dragon.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model
        src="#girlModel"
        position="0 0 0"
        rotation="0 0 0"
        scale="0.2 0.2 0.2">
      </a-gltf-model>
    </a-entity>

    <a-entity mindar-image-target="targetIndex: 1">
      <a-gltf-model
        src="#dragonModel"
        position="0 0 0"
        rotation="0 0 0"
        scale="0.2 0.2 0.2">
      </a-gltf-model>
    </a-entity>
  </a-scene>
</body>
</html>
