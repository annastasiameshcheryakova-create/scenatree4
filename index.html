<!DOCTYPE html>
<html lang="uk">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; }
        /* Простий UI для користувача */
        #ui { 
            position: fixed; top: 10px; left: 10px; z-index: 1000; 
            color: white; background: rgba(0,0,0,0.5); 
            padding: 8px; font-family: sans-serif; border-radius: 4px; 
        }
    </style>
</head>
<body>
    <div id="ui">Наведіть камеру на маркер JIU-JITSU або EUROFAST</div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiError: yes; uiLoading: yes; uiScanning: yes;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="girlModel" src="./3d_anime_character_girl_for_blender_c1.glb"></a-asset-item>
            <a-asset-item id="dragonModel" src="./dragon_statue.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model 
                src="#girlModel" 
                rotation="0 0 0" 
                position="0 -0.5 0" 
                scale="0.8 0.8 0.8">
            </a-gltf-model>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 1">
            <a-gltf-model 
                src="#dragonModel" 
                rotation="90 0 0" 
                position="0 0 0" 
                scale="0.05 0.05 0.05">
            </a-gltf-model>
        </a-entity>

    </a-scene>
</body>
</html>
