
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Markers</title>

  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
  <a-scene embedded arjs>

    <!-- Маркер 1 -->
    <a-marker type="pattern" url="markers/eurofast.patt">
      <a-entity 
        gltf-model="models/girl.glb"
        scale="0.5 0.5 0.5"
        position="0 0 0">
      </a-entity>
    </a-marker>

    <!-- Маркер 2 -->
    <a-marker type="pattern" url="markers/jiu-jitsu.patt">
      <a-entity 
        gltf-model="models/dragon.glb"
        scale="0.7 0.7 0.7"
        position="0 0 0">
      </a-entity>
    </a-marker>

    <!-- Камера -->
    <a-entity camera></a-entity>

  </a-scene>
</body>
</html>
